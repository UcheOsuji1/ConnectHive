<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500" style="background:#1a0a2e">
  <defs>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hiveGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFA500"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="300" cy="250" r="200" fill="url(#glowCenter)"/>

  <!-- Connection lines from people to hive -->
  <g opacity="0.5" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="6,4">
    <line x1="90" y1="160" x2="240" y2="230"/>
    <line x1="510" y1="160" x2="360" y2="230"/>
    <line x1="60" y1="310" x2="235" y2="265"/>
    <line x1="540" y1="310" x2="365" y2="265"/>
    <line x1="150" y1="420" x2="255" y2="310"/>
    <line x1="450" y1="420" x2="345" y2="310"/>
    <line x1="300" y1="440" x2="300" y2="330"/>
  </g>

  <!-- Animated pulse dots on lines -->
  <circle cx="165" cy="195" r="3" fill="#FFD700" opacity="0.8">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="435" cy="195" r="3" fill="#FFD700" opacity="0.8">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="148" cy="287" r="3" fill="#FFD700" opacity="0.8">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="453" cy="287" r="3" fill="#FFD700" opacity="0.8">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Beehive (center) — hexagonal cells stacked -->
  <g transform="translate(300,250)" filter="url(#softGlow)">
    <!-- Row 1 (top) -->
    <polygon points="0,-80 46,-53 46,-27 0,0 -46,-27 -46,-53" fill="#FFA500" stroke="#FFD700" stroke-width="2" opacity="0.95"/>
    <!-- Row 2 -->
    <polygon points="-50,-27 -4,0 -4,27 -50,53 -96,27 -96,0" fill="#E69500" stroke="#FFD700" stroke-width="2" opacity="0.95"/>
    <polygon points="50,-27 96,0 96,27 50,53 4,27 4,0" fill="#E69500" stroke="#FFD700" stroke-width="2" opacity="0.95"/>
    <!-- Row 3 -->
    <polygon points="0,26 46,53 46,80 0,106 -46,80 -46,53" fill="#CC8400" stroke="#FFD700" stroke-width="2" opacity="0.95"/>
    <!-- Inner hex highlights -->
    <polygon points="0,-72 38,-49 38,-31 0,-8 -38,-31 -38,-49" fill="none" stroke="#FFE066" stroke-width="1" opacity="0.5"/>
    <polygon points="-50,-20 -12,-3 -12,19 -50,37 -88,19 -88,-3" fill="none" stroke="#FFE066" stroke-width="1" opacity="0.5"/>
    <polygon points="50,-20 88,-3 88,19 50,37 12,19 12,-3" fill="none" stroke="#FFE066" stroke-width="1" opacity="0.5"/>
    <polygon points="0,33 38,56 38,74 0,97 -38,74 -38,56" fill="none" stroke="#FFE066" stroke-width="1" opacity="0.5"/>
    <!-- Hive entrance -->
    <ellipse cx="0" cy="106" rx="14" ry="7" fill="#7A4000"/>
  </g>

  <!-- Bee on hive -->
  <g transform="translate(300,172)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="10" ry="7" fill="#FFD700"/>
    <rect x="-6" y="-3" width="4" height="6" fill="#333" rx="1"/>
    <rect x="0" y="-3" width="4" height="6" fill="#FFD700" rx="1"/>
    <rect x="4" y="-5" width="1" height="10" fill="#333"/>
    <ellipse cx="-8" cy="-6" rx="6" ry="3" fill="white" opacity="0.7" transform="rotate(-20,-8,-6)"/>
    <ellipse cx="8" cy="-6" rx="6" ry="3" fill="white" opacity="0.7" transform="rotate(20,8,-6)"/>
  </g>

  <!-- Person 1 (top left) -->
  <g transform="translate(80,130)" filter="url(#glow)">
    <circle cx="0" cy="-28" r="16" fill="#7C3AED"/>
    <text x="0" y="-24" text-anchor="middle" font-size="14" fill="white">👤</text>
    <rect x="-18" y="-10" width="36" height="28" rx="8" fill="#7C3AED"/>
    <circle cx="0" cy="-28" r="16" fill="none" stroke="#A78BFA" stroke-width="2">
      <animate attributeName="r" values="16;22;16" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Person 2 (top right) -->
  <g transform="translate(520,130)" filter="url(#glow)">
    <circle cx="0" cy="-28" r="16" fill="#059669"/>
    <text x="0" y="-24" text-anchor="middle" font-size="14" fill="white">👤</text>
    <rect x="-18" y="-10" width="36" height="28" rx="8" fill="#059669"/>
    <circle cx="0" cy="-28" r="16" fill="none" stroke="#34D399" stroke-width="2">
      <animate attributeName="r" values="16;22;16" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Person 3 (left) -->
  <g transform="translate(50,290)" filter="url(#glow)">
    <circle cx="0" cy="-28" r="16" fill="#DC2626"/>
    <text x="0" y="-24" text-anchor="middle" font-size="14" fill="white">👤</text>
    <rect x="-18" y="-10" width="36" height="28" rx="8" fill="#DC2626"/>
    <circle cx="0" cy="-28" r="16" fill="none" stroke="#F87171" stroke-width="2">
      <animate attributeName="r" values="16;22;16" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Person 4 (right) -->
  <g transform="translate(550,290)" filter="url(#glow)">
    <circle cx="0" cy="-28" r="16" fill="#D97706"/>
    <text x="0" y="-24" text-anchor="middle" font-size="14" fill="white">👤</text>
    <rect x="-18" y="-10" width="36" height="28" rx="8" fill="#D97706"/>
    <circle cx="0" cy="-28" r="16" fill="none" stroke="#FCD34D" stroke-width="2">
      <animate attributeName="r" values="16;22;16" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Person 5 (bottom left) -->
  <g transform="translate(140,400)" filter="url(#glow)">
    <circle cx="0" cy="-28" r="16" fill="#2563EB"/>
    <text x="0" y="-24" text-anchor="middle" font-size="14" fill="white">👤</text>
    <rect x="-18" y="-10" width="36" height="28" rx="8" fill="#2563EB"/>
    <circle cx="0" cy="-28" r="16" fill="none" stroke="#60A5FA" stroke-width="2">
      <animate attributeName="r" values="16;22;16" dur="2.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Person 6 (bottom right) -->
  <g transform="translate(460,400)" filter="url(#glow)">
    <circle cx="0" cy="-28" r="16" fill="#BE185D"/>
    <text x="0" y="-24" text-anchor="middle" font-size="14" fill="white">👤</text>
    <rect x="-18" y="-10" width="36" height="28" rx="8" fill="#BE185D"/>
    <circle cx="0" cy="-28" r="16" fill="none" stroke="#F472B6" stroke-width="2">
      <animate attributeName="r" values="16;22;16" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Person 7 (bottom center) -->
  <g transform="translate(300,440)" filter="url(#glow)">
    <circle cx="0" cy="-28" r="16" fill="#0891B2"/>
    <text x="0" y="-24" text-anchor="middle" font-size="14" fill="white">👤</text>
    <rect x="-18" y="-10" width="36" height="28" rx="8" fill="#0891B2"/>
    <circle cx="0" cy="-28" r="16" fill="none" stroke="#22D3EE" stroke-width="2">
      <animate attributeName="r" values="16;22;16" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- App title -->
  <text x="300" y="42" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="#FFD700" filter="url(#glow)">ConnectHive</text>
  <text x="300" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#A78BFA" letter-spacing="3">WHERE CONNECTIONS THRIVE</text>

  <!-- Floating hex particles -->
  <polygon points="490,80 498,75 506,80 506,90 498,95 490,90" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="3s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="100,380 106,376 112,380 112,388 106,392 100,388" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,6;0,0" dur="3.5s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="530,380 536,376 542,380 542,388 536,392 530,388" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" values="0,0;4,4;0,0" dur="4s" repeatCount="indefinite"/>
  </polygon>
  <polygon points="75,200 81,196 87,200 87,208 81,212 75,208" fill="none" stroke="#A78BFA" stroke-width="1" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="0,0;-4,4;0,0" dur="3.2s" repeatCount="indefinite"/>
  </polygon>
</svg>
